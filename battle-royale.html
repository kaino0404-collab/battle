<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥊 배틀 로얄 서바이벌</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0d0d1f; font-family:'Malgun Gothic','Noto Sans KR',sans-serif;
  color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden;
}
#setup-screen {
  display:flex; flex-direction:column; align-items:center;
  width:100%; max-width:540px; padding:28px 24px; gap:14px;
}
.title {
  font-size:2.8rem; font-weight:900; text-align:center;
  background:linear-gradient(135deg,#ff6b35,#ffd700);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 18px rgba(255,107,53,.45));
}
.subtitle { color:#777; font-size:.85rem; text-align:center; }
.input-row { display:flex; width:100%; gap:8px; }
.name-input {
  flex:1; background:rgba(255,255,255,.07); border:1.5px solid rgba(255,255,255,.12);
  border-radius:10px; padding:11px 14px; color:#fff; font-size:.95rem; outline:none; transition:border-color .2s;
}
.name-input:focus { border-color:#ff6b35; }
.name-input::placeholder { color:#444; }
.btn-add {
  background:linear-gradient(135deg,#ff6b35,#ffa500); border:none; border-radius:10px;
  padding:11px 18px; color:#fff; font-weight:bold; cursor:pointer; font-size:1.1rem; transition:all .15s;
}
.btn-add:hover { transform:scale(1.07); }
.chips-box {
  width:100%; min-height:66px; background:rgba(255,255,255,.04);
  border:1.5px solid rgba(255,255,255,.07); border-radius:12px;
  padding:10px; display:flex; flex-wrap:wrap; gap:7px; align-content:flex-start;
}
.chip { display:flex; align-items:center; gap:5px; padding:5px 10px; border-radius:20px; font-size:.82rem; font-weight:bold; color:#000; user-select:none; }
.chip-del { cursor:pointer; opacity:.55; font-size:.75rem; transition:opacity .15s; }
.chip-del:hover { opacity:1; }
.count-info { color:#777; font-size:.8rem; }
.count-info span { color:#ffd700; font-weight:bold; }
.btn-row { display:flex; gap:8px; width:100%; }
.btn-sample {
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.15);
  border-radius:10px; padding:10px 14px; color:#ccc; font-size:.85rem; cursor:pointer; transition:all .15s; white-space:nowrap;
}
.btn-sample:hover { background:rgba(255,255,255,.17); color:#fff; }
.btn-start {
  flex:1; padding:14px; font-size:1.15rem; font-weight:900; border:none; border-radius:12px; cursor:pointer; transition:all .2s;
  background:linear-gradient(135deg,#e74c3c,#c0392b); color:#fff; box-shadow:0 4px 20px rgba(231,76,60,.4);
}
.btn-start:disabled { background:#2a2a2a; box-shadow:none; cursor:not-allowed; color:#555; }
.btn-start:not(:disabled):hover { transform:translateY(-2px); box-shadow:0 6px 26px rgba(231,76,60,.6); }

/* ── 멀티플레이 스크린 ── */
#mp-screen {
  display:none; flex-direction:column; align-items:center; justify-content:center;
  width:100%; min-height:100vh;
}
.mp-title { font-size:1.7rem; font-weight:900; color:#ff6b35; text-align:center; }

/* 방 브라우저 */
#mp-browser {
  width:100%; max-width:600px; padding:28px 24px;
  display:flex; flex-direction:column; gap:14px;
}
.mp-name-row { display:flex; gap:8px; width:100%; }
.connect-badge {
  font-size:.75rem; padding:3px 10px; border-radius:20px;
  background:rgba(255,255,255,.08); color:#888;
  display:flex; align-items:center; gap:4px; white-space:nowrap;
}
.connect-badge.ok  { background:rgba(46,204,113,.18); color:#2ecc71; }
.connect-badge.err { background:rgba(231,76,60,.18); color:#e74c3c; }
.room-browser-box {
  width:100%; background:rgba(255,255,255,.04);
  border:1.5px solid rgba(255,255,255,.07); border-radius:14px; overflow:hidden;
}
.room-browser-hdr {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 14px; border-bottom:1px solid rgba(255,255,255,.06);
  font-size:.85rem; color:#aaa;
}
.btn-refresh {
  background:none; border:1px solid rgba(255,255,255,.15); border-radius:7px;
  padding:4px 12px; color:#aaa; font-size:.8rem; cursor:pointer; transition:all .15s;
}
.btn-refresh:hover { background:rgba(255,255,255,.1); color:#fff; }
.room-list-scroll { max-height:260px; overflow-y:auto; }
.room-item {
  display:flex; align-items:center; gap:12px; padding:11px 14px;
  border-bottom:1px solid rgba(255,255,255,.04); transition:background .12s;
}
.room-item:last-child { border-bottom:none; }
.room-item:hover { background:rgba(255,255,255,.06); }
.room-host-name { font-weight:bold; font-size:.95rem; flex:1; }
.room-host-name span { color:#ffd700; margin-right:4px; }
.room-player-count { color:#888; font-size:.82rem; white-space:nowrap; }
.btn-join {
  background:linear-gradient(135deg,#2ecc71,#27ae60); border:none; border-radius:8px;
  padding:6px 16px; color:#fff; font-weight:bold; cursor:pointer; font-size:.85rem;
  transition:all .15s; white-space:nowrap;
}
.btn-join:hover { transform:scale(1.05); }
.room-list-empty {
  padding:32px 16px; text-align:center; color:#555; font-size:.9rem; line-height:1.7;
}

/* 대기실 (로비) */
#mp-lobby {
  display:none; width:100%; max-width:980px; min-height:82vh;
  padding:24px 28px; flex-direction:column; gap:14px;
}
.lobby-header {
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
}
.lobby-room-title { font-size:1.4rem; font-weight:900; color:#ff6b35; }
.lobby-count-badge {
  background:rgba(255,215,0,.14); border:1px solid rgba(255,215,0,.3);
  border-radius:20px; padding:3px 14px; color:#ffd700; font-size:.88rem; font-weight:bold;
}
.lobby-body {
  display:flex; gap:16px; flex:1; min-height:0;
}
.lobby-players-col {
  flex:1; min-width:0; display:flex; flex-direction:column; gap:8px;
}
.lobby-chat-col {
  flex:1; min-width:0; display:flex; flex-direction:column; gap:8px;
}
.col-label { font-size:.78rem; color:#888; font-weight:bold; letter-spacing:.06em; text-transform:uppercase; }
.player-list-big {
  list-style:none; display:flex; flex-direction:column; gap:5px;
  flex:1; overflow-y:auto; max-height:420px;
  background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06);
  border-radius:12px; padding:8px;
}
.player-list-big li {
  display:flex; align-items:center; gap:9px; padding:8px 12px;
  border-radius:8px; font-size:.9rem; background:rgba(255,255,255,.04);
  transition:background .12s;
}
.player-list-big li:hover { background:rgba(255,255,255,.08); }
.player-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.player-tag { font-size:.72rem; padding:2px 7px; border-radius:10px; font-weight:bold; }
.tag-host { background:rgba(255,215,0,.2); color:#ffd700; }
.tag-me   { background:rgba(255,107,53,.2); color:#ff6b35; }
.chat-box-big {
  flex:1; display:flex; flex-direction:column;
  background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06);
  border-radius:12px; overflow:hidden;
}
.chat-msgs-big {
  flex:1; overflow-y:auto; padding:10px 12px;
  display:flex; flex-direction:column; gap:5px;
  max-height:380px; min-height:120px;
}
.chat-msg-row { font-size:.85rem; line-height:1.45; word-break:break-all; }
.chat-msg-row .cn { font-weight:bold; }
.chat-sys { color:#ffd700; font-size:.82rem; font-style:italic; }
.chat-input-bar {
  display:flex; gap:0; border-top:1px solid rgba(255,255,255,.06);
}
.chat-input-big {
  flex:1; background:transparent; border:none; outline:none;
  padding:9px 14px; color:#fff; font-size:.88rem;
}
.chat-input-big::placeholder { color:#444; }
.chat-send {
  background:rgba(255,107,53,.7); border:none; padding:9px 18px;
  color:#fff; font-size:.85rem; cursor:pointer; transition:background .15s;
}
.chat-send:hover { background:rgba(255,107,53,1); }
.lobby-footer {
  display:flex; gap:8px; align-items:center; flex-wrap:wrap;
}
.lobby-status-txt { flex:1; color:#888; font-size:.85rem; }
.btn-back {
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12);
  border-radius:10px; padding:10px 18px; color:#ccc; cursor:pointer; font-size:.9rem; transition:all .15s;
}
.btn-back:hover { background:rgba(255,255,255,.15); color:#fff; }

#game-screen { display:none; position:relative; }
canvas { display:block; cursor:crosshair; }
.hud-top {
  position:absolute; top:14px; left:14px;
  background:rgba(0,0,0,.82); border:1px solid rgba(255,255,255,.12);
  border-radius:16px; padding:10px 22px; display:flex; align-items:center;
  gap:12px; font-size:1.3rem; font-weight:bold; white-space:nowrap;
  backdrop-filter:blur(6px); pointer-events:none;
}
.survivor-badge {
  background:#ffd700; color:#000; border-radius:12px;
  padding:4px 16px; font-weight:900; font-size:1.6rem;
}
.speed-control {
  position:absolute; bottom:14px; right:14px; background:rgba(0,0,0,.82);
  border-radius:12px; padding:8px 16px; font-size:1rem; display:flex; align-items:center; gap:10px;
}
.speed-control input[type=range] { width:90px; accent-color:#ff6b35; }
.log-panel { position:absolute; bottom:14px; left:14px; width:320px; display:flex; flex-direction:column; gap:6px; pointer-events:none; }
.log-item {
  background:rgba(0,0,0,.88); border-left:4px solid #e74c3c;
  border-radius:0 8px 8px 0; padding:6px 12px; font-size:1rem; line-height:1.5; animation:slideIn .3s ease;
}
@keyframes slideIn { from{opacity:0;transform:translateX(-14px)} to{opacity:1;transform:translateX(0)} }
.controls-hud {
  position:absolute; top:14px; right:14px;
  background:rgba(0,0,0,.78); border:1px solid rgba(255,255,255,.13);
  border-radius:12px; padding:10px 16px; font-size:.82rem;
  line-height:1.85; pointer-events:none; backdrop-filter:blur(4px);
}
.controls-hud .ctrl-title { color:#ff6b35; font-weight:bold; font-size:.88rem; margin-bottom:2px; }
.controls-hud .ctrl-item  { color:#bbb; }

#result-screen {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.88);
  z-index:999; flex-direction:column; align-items:center; justify-content:center; gap:20px;
}
.trophy-big { font-size:5rem; animation:bounce .6s infinite alternate; }
@keyframes bounce { to{transform:translateY(-12px) scale(1.06)} }
.result-title { font-size:2.5rem; font-weight:900; color:#ffd700; text-shadow:0 0 30px gold; }
.winner-name-box {
  font-size:2.2rem; font-weight:bold; padding:16px 44px; border-radius:16px;
  border:3px solid gold; text-align:center; box-shadow:0 0 30px rgba(255,215,0,.3);
}
.btn-restart {
  background:linear-gradient(135deg,#2ecc71,#27ae60); border:none; border-radius:14px;
  padding:14px 44px; color:#fff; font-size:1.1rem; font-weight:bold; cursor:pointer;
  box-shadow:0 4px 20px rgba(46,204,113,.4); transition:all .2s;
}
.btn-restart:hover { transform:translateY(-2px); box-shadow:0 6px 26px rgba(46,204,113,.6); }



/* ── 인게임 채팅 오버레이 ── */
#game-chat-overlay {
  position:absolute; bottom:14px; right:14px; width:280px;
  display:flex; flex-direction:column; gap:4px; pointer-events:none;
}
#game-chat-msgs {
  display:flex; flex-direction:column; gap:3px; max-height:130px; overflow:hidden;
  justify-content:flex-end;
}
.game-chat-msg {
  background:rgba(0,0,0,.82); border-radius:6px; padding:4px 8px;
  font-size:.8rem; line-height:1.4; animation:fadeChat 8s forwards; word-break:break-all;
}
@keyframes fadeChat { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }
#game-chat-input-wrap {
  pointer-events:all; display:flex; gap:5px; display:none;
}
#game-chat-input {
  flex:1; background:rgba(0,0,0,.88); border:1.5px solid rgba(255,255,255,.2);
  border-radius:8px; padding:6px 10px; color:#fff; font-size:.85rem; outline:none;
}
#game-chat-input:focus { border-color:#ff6b35; }
</style>
</head>
<body>

<div id="setup-screen">
  <div class="title">🥊 배틀 로얄</div>
  <div class="subtitle">첫 번째 참가자가 <b style="color:#ff6b35">당신</b>입니다! 나머지는 AI로 진행됩니다 (최소 2명)</div>
  <div class="input-row">
    <input type="text" id="name-input" class="name-input" placeholder="참가자 이름 입력..." maxlength="8"/>
    <button class="btn-add" onclick="addParticipant()">추가</button>
  </div>
  <div class="chips-box" id="chips-box">
    <span style="color:#333;font-size:.8rem;margin:auto;">아직 참가자가 없습니다</span>
  </div>
  <div class="count-info">참가자: <span id="p-count">0</span>명</div>
  <div class="btn-row">
    <button class="btn-sample" onclick="addSamples()">🎲 샘플 추가</button>
    <button class="btn-sample" onclick="showMultiplayer()">🌐 멀티플레이</button>
    <button class="btn-start" id="btn-start" onclick="startGame()" disabled>⚔️ 게임 시작!</button>
  </div>
</div>

<!-- 멀티플레이 화면 -->
<div id="mp-screen">

  <!-- 방 브라우저 -->
  <div id="mp-browser">
    <div class="mp-title">🌐 온라인 멀티플레이</div>
    <div class="mp-name-row">
      <input type="text" id="mp-name" class="name-input" placeholder="내 닉네임 (최대 8자)" maxlength="8" style="flex:1"/>
      <div class="connect-badge" id="connect-badge">연결 중...</div>
    </div>
    <div class="room-browser-box">
      <div class="room-browser-hdr">
        <span>🏠 방 목록</span>
        <button class="btn-refresh" onclick="refreshRooms()">🔄 새로고침</button>
      </div>
      <div class="room-list-scroll" id="room-list-scroll">
        <div class="room-list-empty">서버에 연결 중입니다...</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-back" onclick="showSetup()">← 뒤로</button>
      <button class="btn-start" id="btn-create-room" onclick="doCreateRoom()" style="flex:1">+ 새 방 만들기</button>
    </div>
  </div>

  <!-- 대기실 (로비) -->
  <div id="mp-lobby">
    <div class="lobby-header">
      <div class="lobby-room-title" id="lobby-room-title">대기실</div>
      <div class="lobby-count-badge" id="lobby-count-badge">0 / 50명</div>
    </div>
    <div class="lobby-body">
      <div class="lobby-players-col">
        <div class="col-label">참가자</div>
        <ul class="player-list-big" id="player-list-big"></ul>
      </div>
      <div class="lobby-chat-col">
        <div class="col-label">💬 채팅</div>
        <div class="chat-box-big">
          <div class="chat-msgs-big" id="lobby-chat-msgs"></div>
          <div class="chat-input-bar">
            <input type="text" id="lobby-chat-input" class="chat-input-big" placeholder="메시지 입력 후 Enter..." maxlength="100"/>
            <button class="chat-send" onclick="sendLobbyChat()">전송</button>
          </div>
        </div>
      </div>
    </div>
    <div class="lobby-footer">
      <div class="lobby-status-txt" id="lobby-status"></div>
      <button class="btn-back" onclick="leaveRoom()">나가기</button>
      <button class="btn-start" id="btn-mp-start" style="display:none" onclick="mpStartGame()">⚔️ 게임 시작!</button>
    </div>
  </div>

</div>

<div id="game-screen">
  <canvas id="gameCanvas"></canvas>
  <div class="hud-top">
    <span>🏟️ 생존자</span>
    <span class="survivor-badge" id="survivor-badge">?</span>
  </div>
  <div class="log-panel" id="log-panel"></div>
  <div class="controls-hud">
    <div class="ctrl-title">🎮 조작법 (당신)</div>
    <div class="ctrl-item">WASD — 이동</div>
    <div class="ctrl-item">마우스 — 바라보는 방향</div>
    <div class="ctrl-item">클릭 — 공격 (1초 쿨다운)</div>
  </div>
  <div class="speed-control" id="speed-ctrl-panel">
    ⚡ 속도
    <input type="range" id="speed-slider" min="1" max="6" value="2" oninput="updateSpeed(this.value)"/>
    <span id="speed-label">2x</span>
  </div>
  <div id="game-chat-overlay">
    <div id="game-chat-msgs"></div>
    <div id="game-chat-input-wrap">
      <input type="text" id="game-chat-input" placeholder="메시지 입력 후 Enter..." maxlength="80"/>
    </div>
  </div>
</div>

<div id="result-screen">
  <div class="trophy-big">🏆</div>
  <div class="result-title">우승!</div>
  <div class="winner-name-box" id="winner-box">?</div>
  <button class="btn-restart" onclick="resetGame()">🔄 다시 하기</button>
</div>

<script>
'use strict';

const COLORS = [
  '#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c',
  '#3498db','#9b59b6','#e91e63','#00bcd4','#8bc34a',
  '#ff5722','#00e5ff','#aa00ff','#cddc39','#ff6d00',
  '#f50057','#00e676','#2979ff','#ffea00','#d500f9',
];
const SAMPLES = ['김철수','이영희','박민준','최수진','강동원','윤서아','조현우','정나래','한승준','류지원'];

// ── 전역 변수 ──
let participants  = [];
let characters    = [];
let particles     = [];
let items         = [];
let itemRespawnT  = 0;
let gameRunning   = false;
let gameSpeed     = 2;
let animId        = null;
let lastTime      = 0;
let shakeTimer    = 0;
let logItems      = [];
let audioCtx     = null;
let dramaCam     = null;

// 플레이어 입력
let playerChar          = null;
let playerAttackPressed = false;
const keys       = { w:false, a:false, s:false, d:false };
const mouseWorld = { x:0, y:0 };

// ── 멀티플레이 (Socket.io) ──
let gameMode      = 'solo'; // 'solo' | 'host' | 'client'
let socket        = null;
let mySocketId    = '';
let currentRoomId = null;
let myPlayerIndex = 0;
let mpPlayers     = []; // [{id,name}]
const remoteInputMap = {}; // socketId → {w,a,s,d,facing,attack}

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
let logW=0, logH=0;

// ── 플레이어 키보드/마우스 이벤트 ──
document.addEventListener('keydown', e => {
  if(!gameRunning) return;
  switch(e.code){
    case 'KeyW': case 'ArrowUp':    keys.w=true; e.preventDefault(); break;
    case 'KeyS': case 'ArrowDown':  keys.s=true; e.preventDefault(); break;
    case 'KeyA': case 'ArrowLeft':  keys.a=true; e.preventDefault(); break;
    case 'KeyD': case 'ArrowRight': keys.d=true; e.preventDefault(); break;
  }
});
document.addEventListener('keyup', e => {
  switch(e.code){
    case 'KeyW': case 'ArrowUp':    keys.w=false; break;
    case 'KeyS': case 'ArrowDown':  keys.s=false; break;
    case 'KeyA': case 'ArrowLeft':  keys.a=false; break;
    case 'KeyD': case 'ArrowRight': keys.d=false; break;
  }
});
canvas.addEventListener('mousemove', e => {
  if(!gameRunning) return;
  const rect=canvas.getBoundingClientRect();
  mouseWorld.x=(e.clientX-rect.left-logW/2)/cam.zoom+cam.x;
  mouseWorld.y=(e.clientY-rect.top -logH/2)/cam.zoom+cam.y;
});
canvas.addEventListener('click', () => { if(gameRunning) playerAttackPressed=true; });
canvas.addEventListener('contextmenu', e => e.preventDefault());
window.addEventListener('blur', ()=>{ keys.w=keys.a=keys.s=keys.d=false; });

// 세계 단위 상수
let ARENA_R, CHAR_R, ARM_LEN, FIST_R, PUNCH_RANGE;
const PUNCH_CD   = 1000;
const KB_FORCE   = 28;
const STUN_DUR   = 900;
const MOVE_SPEED = 8;

const cam = { x:0, y:0, zoom:1 };

// ── 캔버스 ──
function setCanvasSize() {
  const dpr = window.devicePixelRatio || 1;
  logW = window.innerWidth;
  logH = window.innerHeight;
  canvas.style.width  = logW + 'px';
  canvas.style.height = logH + 'px';
  canvas.width  = logW * dpr;
  canvas.height = logH * dpr;
}

// ── 참가자 ──
document.getElementById('name-input').addEventListener('keydown', e => { if(e.key==='Enter') addParticipant(); });
function addParticipant() {
  const inp=document.getElementById('name-input'), name=inp.value.trim();
  if(!name||participants.includes(name)){inp.select();return;}
  participants.push(name); inp.value=''; inp.focus(); renderChips();
}
function removeParticipant(name){ participants=participants.filter(n=>n!==name); renderChips(); }
function addSamples(){ SAMPLES.forEach(n=>{if(!participants.includes(n))participants.push(n);}); renderChips(); }
function renderChips(){
  const box=document.getElementById('chips-box');
  document.getElementById('p-count').textContent=participants.length;
  document.getElementById('btn-start').disabled=participants.length<2;
  box.innerHTML='';
  if(!participants.length){ box.innerHTML='<span style="color:#333;font-size:.8rem;margin:auto;">아직 참가자가 없습니다</span>'; return; }
  participants.forEach((name,i)=>{
    const color=COLORS[i%COLORS.length], c=document.createElement('div');
    c.className='chip'; c.style.background=color;
    c.innerHTML=`${name} <span class="chip-del" onclick="removeParticipant('${name.replace(/'/g,"\\'")}')">✕</span>`;
    box.appendChild(c);
  });
}

// ── 사운드 ──
function getAC(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function beep(freq,dur,type='square',vol=0.1){
  try{const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);
  o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+dur);o.start();o.stop(ac.currentTime+dur);}catch(e){}
}
function sndHit()  { beep(130+Math.random()*80,.09,'sawtooth',.1); }
function sndKO()   { beep(240,.1,'square',.18); setTimeout(()=>beep(100,.38,'square',.14),90); }
function sndBump() { beep(80+Math.random()*30,.06,'square',.07); }
function sndWin()  { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.3,'sine',.18),i*130)); }

// ── 색상 유틸 ──
function lighten(hex, amt){
  const n=parseInt(hex.replace('#',''),16);
  return `rgb(${Math.min(255,(n>>16)+amt)},${Math.min(255,((n>>8)&0xff)+amt)},${Math.min(255,(n&0xff)+amt)})`;
}
function hexAlpha(hex,a){ const n=parseInt(hex.replace('#',''),16); return `rgba(${n>>16},${(n>>8)&0xff},${n&0xff},${a})`; }

// ── 네트워크 헬퍼 ──
function netEvent(evt){ if(gameMode==='host' && socket) socket.emit('game-event', evt); }

// ── 파티클 ──
class Particle {
  constructor(wx,wy,color,big=false){
    this.wx=wx; this.wy=wy;
    this.vx=(Math.random()-.5)*(big?14:6); this.vy=(Math.random()-.5)*(big?14:6)-(big?4:1);
    this.life=1; this.decay=.038+Math.random()*.04;
    this.color=color; this.size=(big?5:2.5)+Math.random()*(big?5:2.5);
  }
  update(dt){ const s=dt/16; this.wx+=this.vx*s; this.wy+=this.vy*s; this.vy+=.2*s; this.life-=this.decay*s; }
  draw(){
    if(this.life<=0) return;
    ctx.save(); ctx.globalAlpha=Math.max(0,this.life);
    ctx.fillStyle=this.color; ctx.shadowColor=this.color; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.arc(this.wx,this.wy,this.size,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ── 폭발 이펙트 ──
class Explosion {
  constructor(wx,wy,color){ this.wx=wx; this.wy=wy; this.color=color; this.t=0; this.dur=550; }
  update(dt){ this.t+=dt; }
  get done(){ return this.t>=this.dur; }
  draw(){
    const p=this.t/this.dur, r=CHAR_R;
    const fp=Math.max(0,1-p*2.8);
    if(fp>0){
      ctx.save(); ctx.globalAlpha=fp;
      const g=ctx.createRadialGradient(this.wx,this.wy,0,this.wx,this.wy,r*3);
      g.addColorStop(0,'#ffffff'); g.addColorStop(.25,this.color); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.arc(this.wx,this.wy,r*3,0,Math.PI*2);
      ctx.fillStyle=g; ctx.shadowColor='#fff'; ctx.shadowBlur=r*2; ctx.fill(); ctx.restore();
    }
    const r1=r*(1+p*5), a1=Math.max(0,1-p*1.8);
    if(a1>0){
      ctx.save(); ctx.globalAlpha=a1;
      ctx.beginPath(); ctx.arc(this.wx,this.wy,r1,0,Math.PI*2);
      ctx.strokeStyle=this.color; ctx.lineWidth=r*.35*(1-p);
      ctx.shadowColor=this.color; ctx.shadowBlur=r*1.2; ctx.stroke(); ctx.restore();
    }
    const p2=Math.max(0,p-.12), r2=r*(1+p2*3.5), a2=Math.max(0,.75-p2*2.2);
    if(a2>0){
      ctx.save(); ctx.globalAlpha=a2;
      ctx.beginPath(); ctx.arc(this.wx,this.wy,r2,0,Math.PI*2);
      ctx.strokeStyle='#fff'; ctx.lineWidth=r*.18*(1-p2);
      ctx.shadowColor='#fff'; ctx.shadowBlur=r*.6; ctx.stroke(); ctx.restore();
    }
  }
}
let explosions=[];

// ── 아이템 ──
class Item {
  constructor(type,wx,wy){
    this.type=type||( Math.random()<.5?'range':'speed' );
    if(wx!==undefined){ this.wx=wx; this.wy=wy; }
    else {
      const angle=Math.random()*Math.PI*2;
      const d=ARENA_R*(.15+Math.random()*.55);
      this.wx=Math.cos(angle)*d; this.wy=Math.sin(angle)*d;
    }
    this.r=CHAR_R*.72;
    this.active=true; this.pulseT=0;
  }
  update(dt){ this.pulseT+=dt; }
  draw(){
    if(!this.active) return;
    const x=this.wx, y=this.wy, r=this.r;
    const pulse=Math.sin(this.pulseT/350)*.35+.75;
    const isSpeed=this.type==='speed';
    const glowColor=isSpeed?'#00e5ff':'#FFD700';
    ctx.save(); ctx.globalAlpha=.38*pulse;
    ctx.fillStyle=glowColor; ctx.shadowColor=glowColor; ctx.shadowBlur=r*2.5;
    ctx.beginPath(); ctx.arc(x,y,r*1.9,0,Math.PI*2); ctx.fill(); ctx.restore();
    ctx.save();
    const g=ctx.createRadialGradient(x-r*.3,y-r*.3,r*.05,x,y,r);
    if(isSpeed){
      g.addColorStop(0,'#e0f7ff'); g.addColorStop(.4,'#00bcd4'); g.addColorStop(1,'#0044aa');
    } else {
      g.addColorStop(0,'#fffbe6'); g.addColorStop(.4,'#FFD700'); g.addColorStop(1,'#e65c00');
    }
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.85)'; ctx.lineWidth=r*.1; ctx.stroke();
    ctx.font=`bold ${Math.round(r*.95)}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#fff'; ctx.shadowColor='rgba(0,0,0,.4)'; ctx.shadowBlur=4;
    ctx.fillText(isSpeed?'⚡':'🥊',x,y);
    ctx.restore();
  }
}

function spawnItem(){
  const it=new Item();
  items.push(it);
  netEvent({t:'item',wx:it.wx,wy:it.wy,type:it.type});
}

// ── 캐릭터 ──
class Character {
  constructor(name,wx,wy,color){
    this.name=name; this.wx=wx; this.wy=wy;
    this.vx=0; this.vy=0;
    this.kbx=0; this.kby=0;
    this.powerUpCount=0;
    this.punchSpeedCount=0;
    this.hp=100; this.maxHp=100; this.color=color;
    this.alive=true; this.dyingT=0;

    this.spdM=.9+Math.random()*.2;
    this.dmgM=.85+Math.random()*.3;

    this.target=null; this.targetChangeT=0;
    this.wanderAngle=Math.random()*Math.PI*2; this.wanderT=0;
    this.orbitDir=Math.random()<.5?1:-1; this.orbitDirT=0;
    this.facing=Math.random()*Math.PI*2;

    // 플레이어 제어
    this.isPlayer=false;
    this.isRemotePlayer=false; // 멀티플레이: 다른 플레이어
    this.socketId=null;

    this.stunned=false; this.stunnedT=0; this.spin=0; this.spinV=0;
    this.trail=[];

    this.leftArm ={angle:this.facing-.6, ext:0};
    this.rightArm={angle:this.facing+.6, ext:0};
    this.punchCd=Math.random()*600;
    this.activePunch=null;
  }

  get r(){ return CHAR_R; }
  get armMult(){ return 1.0 + this.powerUpCount * 0.9; }
  get effectivePunchRange(){ return PUNCH_RANGE + ARM_LEN*(this.armMult-1); }
  get punchCdMult(){ return Math.pow(0.72, this.punchSpeedCount); }

  update(dt, all){
    if(!this.alive){ this.dyingT+=dt; return; }

    const dtScale = dt / 16;
    this.punchCd=Math.max(0,this.punchCd-dt);

    const kbDecay = Math.pow(0.04, dt/1000);
    this.kbx *= kbDecay; this.kby *= kbDecay;

    // 아이템 픽업
    for(const item of items){
      if(!item.active) continue;
      if(Math.hypot(this.wx-item.wx,this.wy-item.wy)<this.r+item.r+5){
        item.active=false;
        itemRespawnT=7000;
        if(item.type==='speed'){
          this.punchSpeedCount++;
          addLog(`⚡ <b style="color:${this.color}">${this.name}</b> 속도 UP! (쿨다운 ${Math.round(PUNCH_CD*this.punchCdMult)}ms)`);
        } else {
          this.powerUpCount++;
          addLog(`🥊 <b style="color:${this.color}">${this.name}</b> 사정거리 UP! (×${this.powerUpCount})`);
        }
        for(let i=0;i<14;i++) if(particles.length<350) particles.push(new Particle(this.wx,this.wy,'#FFD700'));
        netEvent({t:'ptcl',wx:this.wx,wy:this.wy,color:'#FFD700',big:false,count:14});
        netEvent({t:'snd',s:'item'});
        try{ const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);
          o.type='sine';o.frequency.setValueAtTime(660,ac.currentTime);o.frequency.linearRampToValueAtTime(1100+this.powerUpCount*100,ac.currentTime+.15);
          g.gain.setValueAtTime(.22,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.3);
          o.start();o.stop(ac.currentTime+.3);}catch(e){}
        break;
      }
    }

    if(this.stunned){
      this.stunnedT-=dt;
      if(this.stunnedT<=0){ this.stunned=false; this.spinV=0; }
      this.vx=0; this.vy=0;
    } else {
      if(this.isPlayer){
        this.updatePlayer(dt,all);
      } else if(this.isRemotePlayer){
        this.updateRemotePlayer(dt,all);
      } else {
        this.targetChangeT-=dt;
        if(this.targetChangeT<=0){ this.updateTarget(all); this.targetChangeT=350+Math.random()*400; }
        this.updateAI(dt);
        this.updatePunch(dt,all);
        if(!this.activePunch){
          this.leftArm.angle +=angleDiff(this.facing-.6,this.leftArm.angle)*.2;
          this.rightArm.angle+=angleDiff(this.facing+.6,this.rightArm.angle)*.2;
          this.leftArm.ext *=.62; this.rightArm.ext*=.62;
        }
      }
    }

    const kbSpd=Math.hypot(this.kbx,this.kby);
    if(kbSpd>10){
      this.trail.push({x:this.wx,y:this.wy});
      if(this.trail.length>7) this.trail.shift();
    } else {
      if(this.trail.length>0) this.trail.shift();
    }

    this.spinV = kbSpd>4 ? kbSpd*.04 : this.spinV*.88;
    this.spin += this.spinV;

    this.wx += (this.vx + this.kbx) * dtScale;
    this.wy += (this.vy + this.kby) * dtScale;

    const dist=Math.hypot(this.wx,this.wy), maxR=ARENA_R-CHAR_R;
    if(dist>maxR){
      const nx=this.wx/dist, ny=this.wy/dist;
      this.wx=nx*maxR; this.wy=ny*maxR;
      const dot=this.kbx*nx+this.kby*ny;
      if(dot>0){ this.kbx-=2.0*dot*nx; this.kby-=2.0*dot*ny; }
      const wallImpact=Math.abs(dot);
      if(wallImpact>9&&!this.stunned){
        this.stunned=true; this.stunnedT=500+Math.random()*200; this.spinV=5;
        sndBump();
        netEvent({t:'snd',s:'bump'});
        for(let i=0;i<8;i++) if(particles.length<350) particles.push(new Particle(this.wx,this.wy,'#8888ff'));
        netEvent({t:'ptcl',wx:this.wx,wy:this.wy,color:'#8888ff',big:false,count:8});
      }
    }
  }

  updateTarget(all){
    let best=null, minD=Infinity;
    for(const c of all){
      if(c===this||!c.alive) continue;
      const d=Math.hypot(c.wx-this.wx,c.wy-this.wy);
      if(d<minD){ minD=d; best=c; }
    }
    this.target=best;
  }

  updateAI(dt){
    {
      let nearItem=null, nearItemD=Infinity;
      for(const item of items){
        if(!item.active) continue;
        const d=Math.hypot(item.wx-this.wx,item.wy-this.wy);
        if(d<nearItemD){ nearItemD=d; nearItem=item; }
      }
      const enemyD=this.target?Math.hypot(this.target.wx-this.wx,this.target.wy-this.wy):Infinity;
      if(nearItem && nearItemD < enemyD*0.85){
        const dx=nearItem.wx-this.wx, dy=nearItem.wy-this.wy;
        this.facing=Math.atan2(dy,dx);
        const spd=MOVE_SPEED*this.spdM*1.1;
        this.vx=dx/nearItemD*spd; this.vy=dy/nearItemD*spd;
        return;
      }
    }
    if(!this.target){ this.doWander(dt); return; }
    const dx=this.target.wx-this.wx, dy=this.target.wy-this.wy, dist=Math.hypot(dx,dy);
    this.facing=Math.atan2(dy,dx);
    const spd=MOVE_SPEED*this.spdM;
    if(dist>this.effectivePunchRange+15){
      this.vx=dx/dist*spd; this.vy=dy/dist*spd;
    } else {
      this.orbitDirT-=dt;
      if(this.orbitDirT<=0){ this.orbitDir*=-1; this.orbitDirT=500+Math.random()*600; }
      const perp=this.facing+this.orbitDir*Math.PI*.5;
      this.vx=Math.cos(perp)*spd*.55; this.vy=Math.sin(perp)*spd*.55;
      if(this.punchCd<=0&&!this.activePunch) this.startPunch();
    }
  }

  updatePlayer(dt,all){
    const spd=MOVE_SPEED*this.spdM;
    let dx=0, dy=0;
    if(keys.w) dy-=1; if(keys.s) dy+=1;
    if(keys.a) dx-=1; if(keys.d) dx+=1;
    const len=Math.hypot(dx,dy);
    if(len>0){ this.vx=dx/len*spd; this.vy=dy/len*spd; }
    else      { this.vx=0; this.vy=0; }
    const mdx=mouseWorld.x-this.wx, mdy=mouseWorld.y-this.wy;
    if(Math.hypot(mdx,mdy)>1) this.facing=Math.atan2(mdy,mdx);
    if(playerAttackPressed){
      playerAttackPressed=false;
      if(this.punchCd<=0&&!this.activePunch) this.startPunch();
    }
    this.updatePunch(dt,all);
    if(!this.activePunch){
      this.leftArm.angle +=angleDiff(this.facing-.6,this.leftArm.angle)*.2;
      this.rightArm.angle+=angleDiff(this.facing+.6,this.rightArm.angle)*.2;
      this.leftArm.ext*=.62; this.rightArm.ext*=.62;
    }
  }

  updateRemotePlayer(dt,all){
    const inp=remoteInputMap[this.socketId];
    if(!inp){ this.vx=0; this.vy=0; }
    else {
      const spd=MOVE_SPEED*this.spdM;
      let dx=0, dy=0;
      if(inp.w) dy-=1; if(inp.s) dy+=1;
      if(inp.a) dx-=1; if(inp.d) dx+=1;
      const len=Math.hypot(dx,dy);
      if(len>0){ this.vx=dx/len*spd; this.vy=dy/len*spd; }
      else      { this.vx=0; this.vy=0; }
      if(inp.facing!==undefined) this.facing=inp.facing;
      if(inp.attack){ inp.attack=false; if(this.punchCd<=0&&!this.activePunch) this.startPunch(); }
    }
    this.updatePunch(dt,all);
    if(!this.activePunch){
      this.leftArm.angle +=angleDiff(this.facing-.6,this.leftArm.angle)*.2;
      this.rightArm.angle+=angleDiff(this.facing+.6,this.rightArm.angle)*.2;
      this.leftArm.ext*=.62; this.rightArm.ext*=.62;
    }
  }

  doWander(dt){
    this.wanderT-=dt;
    if(this.wanderT<=0){ this.wanderAngle=Math.random()*Math.PI*2; this.wanderT=800+Math.random()*1000; }
    const spd=MOVE_SPEED*this.spdM*.38;
    this.vx=Math.cos(this.wanderAngle)*spd; this.vy=Math.sin(this.wanderAngle)*spd;
    this.facing=this.wanderAngle;
  }

  startPunch(){
    const arm=Math.random()<.5?'left':'right', off=arm==='left'?-.26:.26;
    this.activePunch={arm, angle:this.facing+off, timer:0, hit:false};
    this.punchCd=PUNCH_CD*this.punchCdMult;
  }

  updatePunch(dt,all){
    if(!this.activePunch) return;
    this.activePunch.timer+=dt;
    const prog=this.activePunch.timer/140;
    const ext=prog<.35 ? (prog/.35) : Math.max(0,1-(prog-.35)/.65);
    const eLen=ARM_LEN*this.armMult;
    if(this.activePunch.arm==='left'){ this.leftArm.angle=this.activePunch.angle; this.leftArm.ext=ext*eLen; }
    else                              { this.rightArm.angle=this.activePunch.angle; this.rightArm.ext=ext*eLen; }
    if(!this.activePunch.hit&&prog>=.32){ this.activePunch.hit=true; this.doHit(all); }
    if(prog>=1) this.activePunch=null;
  }

  doHit(all){
    const {angle}=this.activePunch;
    const eLen=ARM_LEN*this.armMult;
    const fx=this.wx+Math.cos(angle)*(CHAR_R+eLen);
    const fy=this.wy+Math.sin(angle)*(CHAR_R+eLen);
    for(const c of all){
      if(c===this||!c.alive) continue;
      if(Math.hypot(c.wx-fx,c.wy-fy)>CHAR_R+FIST_R+8) continue;
      const dmg=(10+Math.random()*10)*this.dmgM;
      c.hp-=dmg;
      const kba=Math.atan2(c.wy-this.wy,c.wx-this.wx);
      c.kbx+=Math.cos(kba)*KB_FORCE; c.kby+=Math.sin(kba)*KB_FORCE;
      c.stunned=true; c.stunnedT=STUN_DUR+Math.random()*200; c.spinV=5+Math.random()*3;
      for(let i=0;i<9;i++) if(particles.length<350){
        particles.push(new Particle(fx,fy,'#FFD700'));
        particles.push(new Particle(fx,fy,this.color));
      }
      netEvent({t:'ptcl',wx:fx,wy:fy,color:'#FFD700',big:false,count:9});
      netEvent({t:'ptcl',wx:fx,wy:fy,color:this.color,big:false,count:9});
      sndHit();
      netEvent({t:'snd',s:'hit'});
      if(c.hp<=0){
        c.hp=0; c.alive=false;
        explosions.push(new Explosion(c.wx,c.wy,c.color));
        netEvent({t:'expl',wx:c.wx,wy:c.wy,color:c.color});
        for(let i=0;i<50;i++) if(particles.length<400){
          particles.push(new Particle(c.wx,c.wy,c.color,true));
          particles.push(new Particle(c.wx,c.wy,'#fff',true));
        }
        netEvent({t:'ptcl',wx:c.wx,wy:c.wy,color:c.color,big:true,count:50});
        netEvent({t:'ptcl',wx:c.wx,wy:c.wy,color:'#fff',big:true,count:50});
        shakeTimer=28;
        addLog(`💀 <b style="color:${this.color}">${this.name}</b>이(가) <b style="color:${c.color}">${c.name}</b> 탈락!`);
        sndKO();
        netEvent({t:'snd',s:'ko'});
      }
    }
  }

  // ── 렌더링 ──
  drawBody(){
    const x=this.wx, y=this.wy, r=CHAR_R;
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i], a=(i+1)/this.trail.length;
      ctx.save(); ctx.globalAlpha=a*.25; ctx.fillStyle=this.color;
      ctx.beginPath(); ctx.arc(t.x,t.y,r*(i+1)/this.trail.length*.85,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
    if(!this.alive){
      const alpha=Math.max(0,1-this.dyingT/700);
      if(alpha<=0) return;
      ctx.save(); ctx.globalAlpha=alpha*.28; ctx.fillStyle='#555';
      ctx.beginPath(); ctx.arc(x,y,r*.65,0,Math.PI*2); ctx.fill(); ctx.restore(); return;
    }
    if(this.stunned){ this.drawFallen(x,y); return; }

    ctx.save(); ctx.globalAlpha=.28; ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(x+r*.12,y+r*.18,r*.9,0,Math.PI*2); ctx.fill(); ctx.restore();

    if(this.isPlayer || this.isRemotePlayer){
      const pulse=Math.sin(performance.now()/380)*.18+.72;
      ctx.save(); ctx.globalAlpha=pulse;
      ctx.beginPath(); ctx.arc(x,y,r*1.24,0,Math.PI*2);
      ctx.strokeStyle='#ffffff'; ctx.lineWidth=r*.09;
      ctx.shadowColor='#fff'; ctx.shadowBlur=r*.7; ctx.stroke();
      ctx.restore();
    }

    this.drawArm(x,y,this.leftArm); this.drawArm(x,y,this.rightArm);

    const g=ctx.createRadialGradient(x-r*.32,y-r*.32,r*.04,x,y,r);
    g.addColorStop(0,lighten(this.color,90));
    g.addColorStop(.35,lighten(this.color,30));
    g.addColorStop(.75,this.color);
    g.addColorStop(1,lighten(this.color,-50));
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.25)'; ctx.lineWidth=r*.05; ctx.stroke();

    const sh=ctx.createRadialGradient(x-r*.3,y-r*.32,0,x-r*.3,y-r*.32,r*.42);
    sh.addColorStop(0,'rgba(255,255,255,.55)'); sh.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fillStyle=sh; ctx.fill();

    this.drawEyes(x,y,this.facing,false);
  }

  drawEyes(cx,cy,facing,stunned){
    const r=CHAR_R, ew=r*.22, fd=r*.18, pd=r*.3;
    const fx=Math.cos(facing), fy=Math.sin(facing);
    const px=-Math.sin(facing), py=Math.cos(facing);
    const lx=cx+fx*fd-px*pd, ly=cy+fy*fd-py*pd;
    const rx=cx+fx*fd+px*pd, ry=cy+fy*fd+py*pd;
    if(stunned){
      ctx.save(); ctx.strokeStyle='#ff3333'; ctx.lineWidth=ew*.55; ctx.lineCap='round';
      const s=ew*.75;
      ctx.beginPath(); ctx.moveTo(lx-s,ly-s); ctx.lineTo(lx+s,ly+s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(lx+s,ly-s); ctx.lineTo(lx-s,ly+s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(rx-s,ry-s); ctx.lineTo(rx+s,ry+s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(rx+s,ry-s); ctx.lineTo(rx-s,ry+s); ctx.stroke();
      ctx.restore();
    } else {
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(lx,ly,ew,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(rx,ry,ew,0,Math.PI*2); ctx.fill();
      const pr=ew*.55, po=ew*.28;
      ctx.fillStyle='#111';
      ctx.beginPath(); ctx.arc(lx+fx*po,ly+fy*po,pr,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(rx+fx*po,ry+fy*po,pr,0,Math.PI*2); ctx.fill();
      const hr=pr*.38;
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(lx+fx*po-pr*.3,ly+fy*po-pr*.3,hr,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(rx+fx*po-pr*.3,ry+fy*po-pr*.3,hr,0,Math.PI*2); ctx.fill();
    }
  }

  drawFallen(x,y){
    const r=CHAR_R;
    ctx.save(); ctx.globalAlpha=.28; ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(x+r*.12,y+r*.18,r*.9,0,Math.PI*2); ctx.fill(); ctx.restore();
    ctx.save(); ctx.translate(x,y); ctx.rotate(this.spin);
    this.drawArm(0,0,this.leftArm);
    this.drawArm(0,0,this.rightArm);
    const g=ctx.createRadialGradient(-r*.32,-r*.32,r*.04,0,0,r);
    g.addColorStop(0,lighten(this.color,90));
    g.addColorStop(.35,lighten(this.color,30));
    g.addColorStop(.75,this.color);
    g.addColorStop(1,lighten(this.color,-50));
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.25)'; ctx.lineWidth=r*.05; ctx.stroke();
    const sh=ctx.createRadialGradient(-r*.3,-r*.32,0,-r*.3,-r*.32,r*.42);
    sh.addColorStop(0,'rgba(255,255,255,.5)'); sh.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle=sh; ctx.fill();
    this.drawEyes(0,0,this.facing-this.spin,true);
    ctx.restore();
    if(this.stunnedT>STUN_DUR*.3){
      const t=performance.now()/170;
      for(let i=0;i<3;i++){
        const a=t+i*Math.PI*2/3;
        const sx=x+Math.cos(a)*r*1.2, sy=y-r-8+Math.sin(a*2)*4;
        ctx.save(); ctx.globalAlpha=.9; ctx.fillStyle='#FFD700';
        ctx.font=`${Math.max(12,r*.6)}px serif`; ctx.textAlign='center'; ctx.fillText('★',sx,sy);
        ctx.restore();
      }
    }
  }

  drawArm(x,y,arm){
    const bx=x+Math.cos(arm.angle)*CHAR_R*.8, by=y+Math.sin(arm.angle)*CHAR_R*.8;
    const tx=x+Math.cos(arm.angle)*(CHAR_R+arm.ext+FIST_R*.55);
    const ty=y+Math.sin(arm.angle)*(CHAR_R+arm.ext+FIST_R*.55);
    ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(tx,ty);
    ctx.strokeStyle=lighten(this.color,-20); ctx.lineWidth=CHAR_R*.46; ctx.lineCap='round'; ctx.stroke();
    const fg=ctx.createRadialGradient(tx-FIST_R*.3,ty-FIST_R*.3,FIST_R*.05,tx,ty,FIST_R);
    fg.addColorStop(0,lighten(this.color,50)); fg.addColorStop(1,lighten(this.color,-35));
    ctx.beginPath(); ctx.arc(tx,ty,FIST_R,0,Math.PI*2); ctx.fillStyle=fg; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.35)'; ctx.lineWidth=1.5; ctx.stroke();
  }

  drawUI(sx,sy){
    if(!this.alive) return;
    const screenR=CHAR_R*cam.zoom;
    const bw=screenR*2.2, bh=Math.max(4,screenR*.18);
    const bx=sx-bw/2, by=sy-screenR-bh-5;
    ctx.fillStyle='rgba(0,0,0,.7)';
    rRect(bx-1,by-1,bw+2,bh+2,3); ctx.fill();
    ctx.fillStyle='#1a1a2e';
    rRect(bx,by,bw,bh,2); ctx.fill();
    const ratio=this.hp/this.maxHp;
    ctx.fillStyle=ratio>.5?'#44ff66':ratio>.25?'#ffaa00':'#ff4444';
    if(bw*ratio>1){ rRect(bx,by,bw*ratio,bh,2); ctx.fill(); }

    const fs=Math.max(10, screenR * 0.52);
    const ny=sy+screenR+fs*.9;
    ctx.save();
    ctx.font=`900 ${Math.round(fs)}px 'Malgun Gothic','Noto Sans KR',sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.strokeStyle='rgba(0,0,0,0.95)'; ctx.lineWidth=Math.max(2,fs*.2);
    ctx.strokeText(this.name,sx,ny);
    ctx.fillStyle=this.stunned?'#ffe44d':'#ffffff';
    ctx.fillText(this.name,sx,ny);
    ctx.restore();

    // 플레이어 쿨다운 링 + YOU 라벨
    if(this.isPlayer || this.isRemotePlayer){
      const maxCd=PUNCH_CD*this.punchCdMult;
      const filled=1-Math.min(1,this.punchCd/maxCd);
      const arcR=screenR*1.32; const lw=Math.max(2.5,screenR*.1);
      ctx.save(); ctx.globalAlpha=.9;
      ctx.beginPath(); ctx.arc(sx,sy,arcR,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,255,255,.14)'; ctx.lineWidth=lw; ctx.stroke();
      if(filled>0.001){
        ctx.beginPath(); ctx.arc(sx,sy,arcR,-Math.PI/2,-Math.PI/2+Math.PI*2*filled);
        ctx.strokeStyle=filled>=1?'#ff4455':'#ffaa00';
        ctx.shadowColor=filled>=1?'#ff4455':'#ffaa00'; ctx.shadowBlur=7;
        ctx.lineWidth=lw; ctx.stroke();
      }
      const label = this.isPlayer ? 'YOU' : this.name.substring(0,3);
      const lfs=Math.max(9,screenR*.38);
      ctx.font=`900 ${Math.round(lfs)}px 'Malgun Gothic',sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.strokeStyle='rgba(0,0,0,.95)'; ctx.lineWidth=Math.max(2,lfs*.2);
      ctx.strokeText(this.isPlayer?'YOU':'',sx,by-lfs*.85);
      ctx.fillStyle='#fff'; ctx.shadowColor='#fff'; ctx.shadowBlur=5; ctx.globalAlpha=1;
      ctx.fillText(this.isPlayer?'YOU':'',sx,by-lfs*.85);
      ctx.restore();
    }

    if(this.powerUpCount>0){
      const bfs=Math.max(8,Math.min(13,screenR*.42));
      ctx.save();
      ctx.font=`bold ${bfs}px sans-serif`;
      ctx.textAlign='left'; ctx.textBaseline='middle';
      const badge=`🥊×${this.powerUpCount}`;
      ctx.strokeStyle='rgba(0,0,0,.8)'; ctx.lineWidth=2.5;
      ctx.strokeText(badge, sx+screenR*.75, by+bh*.5);
      ctx.fillStyle='#FFD700';
      ctx.fillText(badge, sx+screenR*.75, by+bh*.5);
      ctx.restore();
    }
  }
}

function rRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

// ── 충돌 ──
function resolveCollisions(){
  const alive=characters.filter(c=>c.alive);
  for(let i=0;i<alive.length;i++){
    for(let j=i+1;j<alive.length;j++){
      const a=alive[i], b=alive[j];
      const dx=b.wx-a.wx, dy=b.wy-a.wy, d=Math.hypot(dx,dy), minD=CHAR_R*2.05;
      if(d<minD&&d>.01){
        const nx=dx/d, ny=dy/d, ov=(minD-d)*.55;
        a.wx-=nx*ov; a.wy-=ny*ov; b.wx+=nx*ov; b.wy+=ny*ov;
        const dvx=(b.kbx+b.vx)-(a.kbx+a.vx), dvy=(b.kby+b.vy)-(a.kby+a.vy), dot=dvx*nx+dvy*ny;
        if(dot<0){
          const e=0.82, imp=-(1+e)*dot*.5;
          a.kbx-=imp*nx; a.kby-=imp*ny; b.kbx+=imp*nx; b.kby+=imp*ny;
          if(Math.abs(imp)>4){
            const weak=a.hp<b.hp?a:b;
            if(!weak.stunned){ weak.stunned=true; weak.stunnedT=400+Math.abs(imp)*50; weak.spinV=2.5+Math.abs(imp)*.35; }
            sndBump();
            const mx=(a.wx+b.wx)/2, my=(a.wy+b.wy)/2;
            for(let k=0;k<6;k++) if(particles.length<350) particles.push(new Particle(mx,my,'#fff'));
          }
        }
      }
    }
  }
}

// ── 카메라 ──
function updateCamera(dt){
  const targetZoom=Math.min(logW,logH)/(ARENA_R*1.78);
  const lp=Math.min(1,dt/120);
  cam.x+=(0-cam.x)*lp; cam.y+=(0-cam.y)*lp;
  cam.zoom+=(targetZoom-cam.zoom)*lp;
}

// ── 아레나 ──
function drawArena(){
  const R=ARENA_R;
  ctx.save();
  ctx.beginPath(); ctx.arc(0,0,R,0,Math.PI*2); ctx.clip();
  const g=ctx.createRadialGradient(0,0,R*.1,0,0,R);
  g.addColorStop(0,'#22226a'); g.addColorStop(.6,'#16164e'); g.addColorStop(1,'#0a0a2e');
  ctx.fillStyle=g; ctx.fillRect(-R,-R,R*2,R*2);
  ctx.strokeStyle='rgba(70,70,180,.042)'; ctx.lineWidth=2;
  const step=Math.round(R/8);
  for(let x=-R;x<=R;x+=step){ ctx.beginPath(); ctx.moveTo(x,-R); ctx.lineTo(x,R); ctx.stroke(); }
  for(let y=-R;y<=R;y+=step){ ctx.beginPath(); ctx.moveTo(-R,y); ctx.lineTo(R,y); ctx.stroke(); }
  for(let i=1;i<=5;i++){
    ctx.beginPath(); ctx.arc(0,0,R*i/5,0,Math.PI*2);
    ctx.strokeStyle=`rgba(80,80,210,${.035+(5-i)*.008})`; ctx.lineWidth=2; ctx.stroke();
  }
  ctx.strokeStyle='rgba(120,120,255,.12)'; ctx.lineWidth=2;
  const cs=R*.04;
  ctx.beginPath(); ctx.moveTo(-cs,0); ctx.lineTo(cs,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-cs); ctx.lineTo(0,cs); ctx.stroke();
  ctx.restore();
  ctx.save();
  ctx.beginPath(); ctx.arc(0,0,R,0,Math.PI*2);
  ctx.strokeStyle='#4444cc'; ctx.lineWidth=CHAR_R*.25;
  ctx.shadowColor='#5555ff'; ctx.shadowBlur=CHAR_R*.8; ctx.stroke();
  ctx.restore();
}

// ── 유틸 ──
function angleDiff(t,c){ return((t-c+Math.PI*3)%(Math.PI*2))-Math.PI; }
function addLog(msg){
  logItems.unshift(msg); if(logItems.length>6)logItems.pop(); renderLog();
  netEvent({t:'log',msg});
}
function renderLog(){ document.getElementById('log-panel').innerHTML=logItems.map(m=>`<div class="log-item">${m}</div>`).join(''); }
function updateSpeed(v){ gameSpeed=parseInt(v); document.getElementById('speed-label').textContent=v+'x'; }

// ── 스폰 ──
function spawnCharacters(){
  const n=participants.length;
  ARENA_R  = Math.min(1400, 580+n*40);
  CHAR_R   = Math.max(28, Math.min(52, 52-Math.max(0,n-5)*.9));
  ARM_LEN  = CHAR_R*1.35;
  FIST_R   = CHAR_R*.4;
  PUNCH_RANGE = CHAR_R*2+ARM_LEN;

  cam.x=0; cam.y=0;
  cam.zoom=Math.min(logW,logH)/(ARENA_R*1.78);

  characters=participants.map((name,i)=>{
    const angle=(i/n)*Math.PI*2+Math.random()*.2;
    const d=ARENA_R*(.55+Math.random()*.3);
    const c=new Character(name,Math.cos(angle)*d,Math.sin(angle)*d,COLORS[i%COLORS.length]);

    // 멀티플레이: 플레이어 역할 배정
    if(gameMode==='host'){
      if(i===myPlayerIndex){ c.isPlayer=true; }
      else if(i<mpPlayers.length){ c.isRemotePlayer=true; c.socketId=mpPlayers[i].id; }
      // 나머지는 AI
    } else {
      if(i===myPlayerIndex) c.isPlayer=true;
    }
    return c;
  });

  playerChar = characters[myPlayerIndex] || null;

  items=[]; itemRespawnT=0;
  const itemCount=Math.max(2, Math.min(6, Math.ceil(n/2)));
  for(let i=0;i<itemCount;i++) items.push(new Item());

  // 호스트: 클라이언트에게 초기화 정보 전송
  if(gameMode==='host' && socket){
    socket.emit('game-event',{
      t:'init',
      params:{ARENA_R,CHAR_R,ARM_LEN,FIST_R,PUNCH_RANGE},
      chars:characters.map(c=>({name:c.name,color:c.color})),
      items:items.map(it=>({type:it.type,wx:it.wx,wy:it.wy}))
    });
  }
}

// ── 게임 루프 ──
function gameLoop(ts){
  if(!gameRunning) return;
  const dt=Math.min(ts-lastTime,50); lastTime=ts;

  for(let s=0;s<gameSpeed;s++){
    const dtS=dt/gameSpeed;
    for(const c of characters) c.update(dtS,characters);
    resolveCollisions();
    for(const p of particles) p.update(dtS);
    particles=particles.filter(p=>p.life>0);
    for(const item of items) item.update(dtS);
    for(const e of explosions) e.update(dtS);
    explosions=explosions.filter(e=>!e.done);
  }

  const noActive=items.every(i=>!i.active);
  if(noActive){ itemRespawnT-=dt; if(itemRespawnT<=0){ spawnItem(); itemRespawnT=0; } }

  updateCamera(dt);

  const alive=characters.filter(c=>c.alive);
  document.getElementById('survivor-badge').textContent=alive.length+'명';

  drawFrame();
  shakeTimer=Math.max(0,shakeTimer-1);

  // 호스트: 상태를 클라이언트에 전송
  if(gameMode==='host' && socket && socket.connected){
    socket.emit('game-state', serializeState());
  }

  if(alive.length<=1&&gameRunning){
    if(explosions.length===0&&particles.every(p=>p.life<=0.2)){
      gameRunning=false;
      const winner=alive[0]||null;
      if(gameMode==='host'){
        netEvent({t:'result',winner:winner?{name:winner.name,color:winner.color}:null});
      }
      setTimeout(()=>showResult(winner),400); return;
    }
  }
  animId=requestAnimationFrame(gameLoop);
}

// ── 클라이언트 렌더 루프 ──
function clientGameLoop(ts){
  if(!gameRunning) return;
  const dt=Math.min(ts-lastTime,50); lastTime=ts;

  for(const p of particles) p.update(dt);
  particles=particles.filter(p=>p.life>0);
  for(const e of explosions) e.update(dt);
  explosions=explosions.filter(e=>!e.done);
  for(const item of items) item.update(dt);

  updateCamera(dt);

  const alive=characters.filter(c=>c.alive);
  document.getElementById('survivor-badge').textContent=alive.length+'명';

  drawFrame();
  shakeTimer=Math.max(0,shakeTimer-1);

  sendPlayerInput();

  animId=requestAnimationFrame(clientGameLoop);
}

function sendPlayerInput(){
  if(!socket||!socket.connected||gameMode!=='client') return;
  const c=characters[myPlayerIndex];
  if(!c||!c.alive) return;
  const dx=mouseWorld.x-c.wx, dy=mouseWorld.y-c.wy;
  socket.emit('player-input',{w:keys.w,a:keys.a,s:keys.s,d:keys.d,facing:Math.atan2(dy,dx),attack:playerAttackPressed});
  playerAttackPressed=false;
}

function drawFrame(){
  const dpr = window.devicePixelRatio || 1;
  ctx.fillStyle='#0d0d1f'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.scale(dpr, dpr);
  if(shakeTimer>0){ const s=Math.min(shakeTimer,18)*.55; ctx.translate((Math.random()-.5)*s,(Math.random()-.5)*s); }
  ctx.save();
  ctx.translate(logW/2, logH/2);
  ctx.scale(cam.zoom, cam.zoom);
  ctx.translate(-cam.x, -cam.y);
  drawArena();
  for(const item of items) item.draw();
  const sorted=[...characters].sort((a,b)=>a.wy-b.wy);
  for(const c of sorted) c.drawBody();
  for(const p of particles) p.draw();
  for(const e of explosions) e.draw();
  ctx.restore();

  if(cam.zoom>0.15){
    for(const c of characters){
      if(!c.alive) continue;
      const sx=logW/2+(c.wx-cam.x)*cam.zoom;
      const sy=logH/2+(c.wy-cam.y)*cam.zoom;
      c.drawUI(sx,sy);
    }
  }

  // 마우스 십자선 (내 캐릭터가 있을 때)
  if(playerChar && playerChar.alive && !playerChar.stunned){
    const sx=logW/2+(mouseWorld.x-cam.x)*cam.zoom;
    const sy=logH/2+(mouseWorld.y-cam.y)*cam.zoom;
    const cs=11;
    ctx.save(); ctx.strokeStyle='rgba(255,255,255,.8)'; ctx.lineWidth=1.5;
    ctx.shadowColor='#fff'; ctx.shadowBlur=5;
    ctx.beginPath(); ctx.moveTo(sx-cs,sy); ctx.lineTo(sx+cs,sy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx,sy-cs); ctx.lineTo(sx,sy+cs); ctx.stroke();
    ctx.beginPath(); ctx.arc(sx,sy,4.5,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  ctx.restore();
}

// ── 상태 직렬화/역직렬화 ──
function serializeState(){
  return {
    c: characters.map(ch=>({
      wx:Math.round(ch.wx), wy:Math.round(ch.wy),
      kbx:+ch.kbx.toFixed(2), kby:+ch.kby.toFixed(2),
      hp:+ch.hp.toFixed(1), alive:ch.alive,
      facing:+ch.facing.toFixed(3),
      stunned:ch.stunned, stunnedT:Math.round(ch.stunnedT),
      spin:+ch.spin.toFixed(3),
      la:{a:+ch.leftArm.angle.toFixed(3),e:+ch.leftArm.ext.toFixed(1)},
      ra:{a:+ch.rightArm.angle.toFixed(3),e:+ch.rightArm.ext.toFixed(1)},
      trail:ch.trail,
      pcu:ch.powerUpCount, psc:ch.punchSpeedCount,
      pcd:Math.round(ch.punchCd), dt:Math.round(ch.dyingT)
    })),
    i: items.map(it=>({wx:Math.round(it.wx),wy:Math.round(it.wy),active:it.active,type:it.type})),
    shake: shakeTimer
  };
}

function applyState(data){
  shakeTimer=Math.max(shakeTimer,data.shake);
  data.c.forEach((s,i)=>{
    if(i>=characters.length) return;
    const c=characters[i];
    c.wx=s.wx; c.wy=s.wy; c.kbx=s.kbx; c.kby=s.kby;
    c.hp=s.hp; c.alive=s.alive;
    c.facing=s.facing; c.stunned=s.stunned; c.stunnedT=s.stunnedT; c.spin=s.spin;
    c.leftArm.angle=s.la.a; c.leftArm.ext=s.la.e;
    c.rightArm.angle=s.ra.a; c.rightArm.ext=s.ra.e;
    c.trail=s.trail;
    c.powerUpCount=s.pcu; c.punchSpeedCount=s.psc;
    c.punchCd=s.pcd; c.dyingT=s.dt;
  });
  while(items.length<data.i.length) items.push(new Item('range',0,0));
  data.i.forEach((s,i)=>{
    items[i].wx=s.wx; items[i].wy=s.wy;
    items[i].active=s.active; items[i].type=s.type;
    items[i].r=CHAR_R*.72;
  });
  while(items.length>data.i.length) items.pop();
}

function applyEvent(evt){
  if(evt.t==='init'){
    ARENA_R=evt.params.ARENA_R; CHAR_R=evt.params.CHAR_R;
    ARM_LEN=evt.params.ARM_LEN; FIST_R=evt.params.FIST_R;
    PUNCH_RANGE=evt.params.PUNCH_RANGE;
    cam.x=0; cam.y=0; cam.zoom=Math.min(logW,logH)/(ARENA_R*1.78);
    characters=evt.chars.map((cd,i)=>{
      const c=new Character(cd.name,0,0,cd.color);
      c.isPlayer=(i===myPlayerIndex);
      return c;
    });
    playerChar=characters[myPlayerIndex]||null;
    items=evt.items.map(id=>new Item(id.type,id.wx,id.wy));
    particles=[]; explosions=[]; logItems=[];
    gameRunning=true;
    document.getElementById('game-screen').style.display='block';
    document.getElementById('mp-screen').style.display='none';
    renderLog();
    lastTime=performance.now();
    animId=requestAnimationFrame(clientGameLoop);
    return;
  }
  if(evt.t==='ptcl'){
    for(let i=0;i<(evt.count||5);i++)
      if(particles.length<400) particles.push(new Particle(evt.wx,evt.wy,evt.color,evt.big));
    return;
  }
  if(evt.t==='expl'){
    explosions.push(new Explosion(evt.wx,evt.wy,evt.color));
    shakeTimer=28; return;
  }
  if(evt.t==='log'){ logItems.unshift(evt.msg); if(logItems.length>6)logItems.pop(); renderLog(); return; }
  if(evt.t==='item'){
    items.push(new Item(evt.type,evt.wx,evt.wy)); return;
  }
  if(evt.t==='snd'){
    if(evt.s==='hit')  sndHit();
    if(evt.s==='ko')   sndKO();
    if(evt.s==='bump') sndBump();
    return;
  }
  if(evt.t==='result'){
    gameRunning=false; cancelAnimationFrame(animId);
    setTimeout(()=>{
      document.getElementById('result-screen').style.display='flex';
      const box=document.getElementById('winner-box');
      const w=evt.winner;
      if(w){ box.textContent=w.name; box.style.color=w.color; box.style.borderColor=w.color; box.style.boxShadow=`0 0 35px ${hexAlpha(w.color,.4)}`; }
      else { box.textContent='무승부!'; }
      sndWin();
    },400);
    return;
  }
}

// ── 시작/종료 ──
function startGame(){
  if(participants.length<2) return;
  setCanvasSize(); spawnCharacters();
  particles=[]; logItems=[]; explosions=[]; dramaCam=null; gameRunning=true;
  playerAttackPressed=false; keys.w=keys.a=keys.s=keys.d=false;
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('mp-screen').style.display='none';
  document.getElementById('game-screen').style.display='block';
  document.getElementById('speed-ctrl-panel').style.display = gameMode==='client' ? 'none' : '';
  renderLog();
  lastTime=performance.now();
  animId=requestAnimationFrame(gameLoop);
}

function showResult(winner){
  document.getElementById('result-screen').style.display='flex';
  const box=document.getElementById('winner-box');
  if(winner){ box.textContent=winner.name; box.style.color=winner.color; box.style.borderColor=winner.color; box.style.boxShadow=`0 0 35px ${hexAlpha(winner.color,.4)}`; }
  else { box.textContent='무승부!'; }
  sndWin();
}

function resetGame(){
  if(animId) cancelAnimationFrame(animId);
  gameRunning=false;
  playerChar=null; playerAttackPressed=false; keys.w=keys.a=keys.s=keys.d=false;
  if(socket){ socket.disconnect(); socket=null; }
  currentRoomId=null; gameMode='solo'; myPlayerIndex=0; mpPlayers=[];
  document.getElementById('result-screen').style.display='none';
  document.getElementById('game-screen').style.display='none';
  document.getElementById('mp-screen').style.display='none';
  document.getElementById('setup-screen').style.display='';
}

window.addEventListener('resize',()=>{ if(gameRunning) setCanvasSize(); });

// ════════════════════════════════════════
// ── 멀티플레이 UI (Socket.io) ──
// ════════════════════════════════════════

function showMultiplayer(){
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('mp-screen').style.display='flex';
  document.getElementById('mp-browser').style.display='flex';
  document.getElementById('mp-lobby').style.display='none';
  if(!socket || !socket.connected) connectToServer();
}

function showSetup(){
  if(socket){ socket.disconnect(); socket=null; }
  currentRoomId=null; mpPlayers=[]; myPlayerIndex=0; gameMode='solo';
  document.getElementById('mp-screen').style.display='none';
  document.getElementById('setup-screen').style.display='';
}

// ── 서버 연결 ──
function connectToServer(){
  const SERVER_URL = location.protocol==='file:' ? 'http://localhost:3000' : location.origin;
  socket = io(SERVER_URL, {transports:['websocket','polling']});

  socket.on('connect', ()=>{
    mySocketId=socket.id;
    setBadge(true);
    socket.emit('join-global-lobby');
    setupSocketListeners();
  });
  socket.on('connect_error', ()=>{
    setBadge(false);
    document.getElementById('room-list-scroll').innerHTML=
      '<div class="room-list-empty">⚠️ 서버에 연결할 수 없습니다.<br>터미널에서 <b>node server.js</b>를 실행하거나<br><b>http://localhost:3000</b>으로 접속해주세요.</div>';
  });
}

function setBadge(ok){
  const b=document.getElementById('connect-badge');
  if(!b) return;
  b.className='connect-badge'+(ok?' ok':' err');
  b.textContent=ok?'✅ 연결됨':'❌ 연결 안됨';
}

function setupSocketListeners(){
  socket.on('room-list', list => renderRoomList(list));

  socket.on('room-created', ({roomId})=>{
    currentRoomId=roomId;
    gameMode='host'; myPlayerIndex=0;
    showLobby(true, mpPlayers);
  });

  socket.on('join-success', ({playerIndex, players})=>{
    myPlayerIndex=playerIndex; mpPlayers=players;
    showLobby(false, players);
  });

  socket.on('join-error', msg=>{ alert('참가 실패: '+msg); });

  socket.on('players-updated', players=>{
    mpPlayers=players;
    updateLobbyList(players);
  });

  socket.on('chat-message', ({name, msg})=>{
    addChatMsg(name, msg, !gameRunning);
  });

  socket.on('game-started', ({players})=>{ onGameStarted(players); });

  socket.on('game-state', state=>{ applyState(state); });

  socket.on('game-event', evt=>{ applyEvent(evt); });

  socket.on('player-input', ({id, input})=>{
    remoteInputMap[id]=input;
  });

  socket.on('player-disconnected', ({id})=>{
    delete remoteInputMap[id];
    const c=characters.find(ch=>ch.socketId===id);
    if(c){ c.isRemotePlayer=false; c.socketId=null; }
  });

  socket.on('room-closed', msg=>{
    alert(msg);
    currentRoomId=null; mpPlayers=[]; gameMode='solo';
    document.getElementById('mp-lobby').style.display='none';
    document.getElementById('mp-browser').style.display='flex';
    socket.emit('join-global-lobby');
  });
}

// ── 방 목록 렌더링 ──
function renderRoomList(list){
  const el=document.getElementById('room-list-scroll');
  if(!list||list.length===0){
    el.innerHTML='<div class="room-list-empty">아직 열린 방이 없습니다.<br>아래 버튼으로 새 방을 만드세요!</div>';
    return;
  }
  el.innerHTML=list.map(r=>`
    <div class="room-item">
      <div class="room-host-name"><span>👑</span>${r.hostName}의 방</div>
      <div class="room-player-count">${r.playerCount} / ${r.maxPlayers}명</div>
      <button class="btn-join" onclick="doJoinRoom('${r.id}')">참가하기</button>
    </div>`).join('');
}

function refreshRooms(){
  if(socket && socket.connected) socket.emit('join-global-lobby');
}

// ── 방 만들기 ──
function doCreateRoom(){
  const name=document.getElementById('mp-name').value.trim();
  if(!name){ alert('닉네임을 입력해주세요'); return; }
  if(!socket||!socket.connected){ alert('서버에 연결되지 않았습니다'); return; }
  mpPlayers=[{id: mySocketId, name}];
  socket.emit('create-room', {name});
}

// ── 방 참가 ──
function doJoinRoom(roomId){
  const name=document.getElementById('mp-name').value.trim();
  if(!name){ alert('닉네임을 입력해주세요'); return; }
  if(!socket||!socket.connected){ alert('서버에 연결되지 않았습니다'); return; }
  gameMode='client';
  socket.emit('join-room', {roomId, name});
}

// ── 대기실 표시 ──
function showLobby(isHost, players){
  document.getElementById('mp-browser').style.display='none';
  document.getElementById('mp-lobby').style.display='flex';
  document.getElementById('lobby-room-title').textContent=
    isHost ? '내 방' : (mpPlayers[0]?.name||'?')+'의 방';
  document.getElementById('btn-mp-start').style.display=isHost?'':'none';
  document.getElementById('lobby-status').textContent=isHost
    ? '✅ 방이 만들어졌습니다. 친구들이 참가하면 시작하세요!'
    : '⏳ 방장이 게임을 시작하기를 기다리는 중...';
  updateLobbyList(players);
}

function updateLobbyList(players){
  if(players) mpPlayers=players;
  const icons=['👑','🥊','🌟','🔥','⚡','💫','🎯','🎲','🏆','🌈'];
  const ul=document.getElementById('player-list-big');
  if(!ul) return;
  ul.innerHTML=mpPlayers.map((p,i)=>{
    const name=typeof p==='string'?p:p.name;
    const color=COLORS[i%COLORS.length];
    const isHost=i===0, isMe=i===myPlayerIndex;
    return `<li>
      <span class="player-dot" style="background:${color}"></span>
      <span style="flex:1">${name}</span>
      ${isHost?'<span class="player-tag tag-host">방장</span>':''}
      ${isMe?'<span class="player-tag tag-me">나</span>':''}
    </li>`;
  }).join('');
  document.getElementById('lobby-count-badge').textContent=`${mpPlayers.length} / 50명`;
  const btn=document.getElementById('btn-mp-start');
  if(btn) btn.disabled=mpPlayers.length<2;
}

// ── 채팅 ──
function addChatMsg(name, msg, inLobby){
  if(inLobby){
    const box=document.getElementById('lobby-chat-msgs');
    if(!box) return;
    const div=document.createElement('div');
    const i=mpPlayers.findIndex(p=>p.name===name);
    const color=i>=0?COLORS[i%COLORS.length]:'#aaa';
    div.className='chat-msg-row';
    div.innerHTML=`<span class="cn" style="color:${color}">${name}</span>: ${msg}`;
    box.appendChild(div);
    box.scrollTop=box.scrollHeight;
  } else {
    const box=document.getElementById('game-chat-msgs');
    if(!box) return;
    const div=document.createElement('div');
    div.className='game-chat-msg'; div.textContent=`${name}: ${msg}`;
    box.appendChild(div);
    while(box.children.length>8) box.removeChild(box.firstChild);
  }
}

function addSysMsg(msg){
  const box=document.getElementById('lobby-chat-msgs');
  if(!box) return;
  const div=document.createElement('div');
  div.className='chat-sys'; div.textContent=msg;
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}

function sendLobbyChat(){
  const inp=document.getElementById('lobby-chat-input');
  const msg=inp.value.trim();
  if(!msg||!socket) return;
  inp.value='';
  socket.emit('chat-message',{msg});
}

function sendGameChat(){
  const inp=document.getElementById('game-chat-input');
  const msg=inp.value.trim();
  if(!msg||!socket) return;
  inp.value='';
  socket.emit('chat-message',{msg});
}

document.addEventListener('DOMContentLoaded',()=>{
  const li=document.getElementById('lobby-chat-input');
  if(li) li.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); sendLobbyChat(); } });

  const gi=document.getElementById('game-chat-input');
  if(gi) gi.addEventListener('keydown',e=>{
    if(e.key==='Enter'){ e.preventDefault(); sendGameChat(); document.getElementById('game-chat-input-wrap').style.display='none'; canvas.focus(); }
    if(e.key==='Escape'){ document.getElementById('game-chat-input-wrap').style.display='none'; gi.value=''; canvas.focus(); }
  });
});

document.addEventListener('keydown',e=>{
  if(!gameRunning) return;
  if(e.key==='Enter' && document.activeElement!==document.getElementById('game-chat-input')){
    e.preventDefault();
    const wrap=document.getElementById('game-chat-input-wrap');
    wrap.style.display='flex';
    document.getElementById('game-chat-input').focus();
  }
});

// ── 나가기 / 시작 ──
function leaveRoom(){
  if(socket) socket.emit('leave-room');
  currentRoomId=null; mpPlayers=[]; myPlayerIndex=0; gameMode='solo';
  document.getElementById('mp-lobby').style.display='none';
  document.getElementById('mp-browser').style.display='flex';
  document.getElementById('room-list-scroll').innerHTML='<div class="room-list-empty">방 목록을 불러오는 중...</div>';
}

function mpStartGame(){
  if(gameMode!=='host'||!socket) return;
  socket.emit('start-game');
}

function onGameStarted(players){
  participants=players.map(p=>typeof p==='string'?p:p.name);
  mpPlayers=players;
  if(gameMode==='host'){
    setCanvasSize();
    spawnCharacters();
    particles=[]; logItems=[]; explosions=[]; dramaCam=null; gameRunning=true;
    playerAttackPressed=false; keys.w=keys.a=keys.s=keys.d=false;
    document.getElementById('mp-screen').style.display='none';
    document.getElementById('game-screen').style.display='block';
    document.getElementById('speed-ctrl-panel').style.display='';
    renderLog();
    lastTime=performance.now();
    animId=requestAnimationFrame(gameLoop);
  } else {
    setCanvasSize();
    document.getElementById('speed-ctrl-panel').style.display='none';
    playerAttackPressed=false; keys.w=keys.a=keys.s=keys.d=false;
  }
}
</script>
